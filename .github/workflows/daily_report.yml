name: Winners Report

on:
  schedule:
    # Monday 9am MYT (UTC+8 = 01:00 UTC)
    - cron: '0 1 * * 1'
    # Friday 9am MYT
    - cron: '0 1 * * 5'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run winners script
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_winners.py

      - name: Commit and push report + previous winners
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html previous_winners.json
          git diff --staged --quiet || git commit -m "Winners report $(date +'%A %-d %b %Y')"
          git push
